<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Pressure Monitor</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; background:#0b0f14; color:#e6edf3; }
    .topbar { display:flex; gap:10px; padding:14px; background:#0f1620; position:sticky; top:0; }
    .tabbtn { padding:10px 14px; border-radius:12px; border:1px solid #263241; background:#0b0f14; color:#e6edf3; cursor:pointer; }
    .tabbtn.active { background:#142235; border-color:#3a567a; }
    .wrap { padding:18px; max-width: 1000px; margin: 0 auto; }
    .card { background:#0f1620; border:1px solid #263241; border-radius:16px; padding:18px; }
    .big { font-size:72px; font-weight:800; letter-spacing:-1px; line-height:1; }
    .unit { font-size:20px; opacity:0.85; margin-left:8px; }
    .meta { opacity:0.75; margin-top:12px; font-size:14px; }
    .hidden { display:none; }
    canvas { width:100% !important; height:420px !important; }
  </style>
</head>
<body>

  <div class="topbar">
    <button class="tabbtn active" id="tabPressureBtn">Pressure</button>
    <button class="tabbtn" id="tabTrendBtn">Trend 24h</button>
  </div>

  <div class="wrap">
    <!-- TAB 1 -->
    <div class="card" id="tabPressure">
      <div>
        <span class="big" id="barValue">--.--</span><span class="unit">bar</span>
      </div>
      <div class="meta" id="metaLine">Waiting for data...</div>
    </div>

    <!-- TAB 2 -->
    <div class="card hidden" id="tabTrend" style="margin-top:16px;">
      <canvas id="pChart"></canvas>
      <div class="meta" id="trendMeta">Updating…</div>
    </div>
  </div>

<script>
  const tabPressureBtn = document.getElementById('tabPressureBtn');
  const tabTrendBtn = document.getElementById('tabTrendBtn');
  const tabPressure = document.getElementById('tabPressure');
  const tabTrend = document.getElementById('tabTrend');

  tabPressureBtn.onclick = () => {
    tabPressureBtn.classList.add('active');
    tabTrendBtn.classList.remove('active');
    tabPressure.classList.remove('hidden');
    tabTrend.classList.add('hidden');
  };
  tabTrendBtn.onclick = () => {
    tabTrendBtn.classList.add('active');
    tabPressureBtn.classList.remove('active');
    tabTrend.classList.remove('hidden');
    tabPressure.classList.add('hidden');
  };

  // ---- BIG NUMBER ----
  async function refreshLatest() {
    try {
      const r = await fetch('/api/latest');
      const j = await r.json();
      if (!j.ok) return;

      document.getElementById('barValue').textContent = Number(j.bar).toFixed(2);
      document.getElementById('metaLine').textContent =
        `Voltage: ${Number(j.voltage).toFixed(3)} V • Last: ${new Date(j.ts*1000).toLocaleString()}`;
    } catch(e) {}
  }

  // ---- CHART ----
  const ctx = document.getElementById('pChart').getContext('2d');

  const chart = new Chart(ctx, {
    type: 'line',
    data: { labels: [], datasets: [{
      label: 'Pressure (bar)',
      data: [],
      tension: 0.25,
      pointRadius: 0,
      borderWidth: 2
    }]},
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: { position: 'left', title: { display: true, text: 'bar' } },
        x: {
          title: { display: true, text: 'time (last 24h)' },
          ticks: {
            // метка раз в 1 час (данные раз в 20 сек => много точек)
            callback: function(value, index) {
              const label = this.getLabelForValue(value);
              // label = ISO; показываем только каждый 180-й сэмпл (3600/20=180)
              if (index % 180 === 0) return new Date(label).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
              return '';
            },
            maxRotation: 0,
            autoSkip: false
          }
        }
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: (items) => new Date(items[0].label).toLocaleString(),
            label: (item) => ` ${Number(item.raw).toFixed(2)} bar`
          }
        }
      }
    }
  });

  async function refreshSeries() {
    try {
      const r = await fetch('/api/series?hours=24');
      const j = await r.json();
      if (!j.ok) return;

      chart.data.labels = j.labels;
      chart.data.datasets[0].data = j.values;
      chart.update('none');

      document.getElementById('trendMeta').textContent =
        `Points: ${j.values.length} • Updated: ${new Date().toLocaleString()}`;
    } catch(e) {}
  }

  // first load
  refreshLatest();
  refreshSeries();

  // intervals
  setInterval(refreshLatest, 3000);   // цифра каждые 3 секунды
  setInterval(refreshSeries, 60000);  // график раз в минуту
</script>
</body>
</html>
